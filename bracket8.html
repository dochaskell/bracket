<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Double Elimination Bracket</title>
<style>
:root{--bg:#00b140;--text:#15202b;--muted:#64748b;--line:rgba(15,23,42,.38);--slot-border:rgba(15,23,42,.12);--font:'Anton','Impact','Arial Black',sans-serif}
*{box-sizing:border-box}html,body{margin:0;width:1920px;height:1080px;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}body,.scene{position:relative}.scene{width:100%;height:100%;perspective:1800px}.card{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.2,.8,.2,1)}.card.flipped{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden}.back{transform:rotateY(180deg)}.flip-corner{position:absolute;top:18px;right:18px;width:74px;height:74px;border:0;background:transparent;cursor:pointer;z-index:20}.flip-corner:after{content:"Edit";position:absolute;top:12px;right:6px;transform:rotate(45deg);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(15,23,42,.7);opacity:0;transition:opacity .26s;pointer-events:none}.back .flip-corner:after{content:"View"}.flip-corner:hover:after{opacity:1}.bracket-wrap{position:absolute;inset:24px;overflow:hidden}.bracket-grid{position:absolute;inset:28px;display:grid;grid-template-columns:430px 430px 430px 330px;column-gap:28px;grid-template-rows:88px 470px 78px 232px;row-gap:18px}.round-title{font-size:32px;line-height:1;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#fff;align-self:end;background:#000;padding:10px 16px;border-radius:8px;display:inline-block}.title.small{font-size:24px}.column,.stack{position:relative}.stack{position:absolute;inset:0}.match{position:absolute;width:360px;height:104px}.match.wide{width:390px}.match.narrow{width:300px}.slot{z-index:2;position:absolute;left:0;width:290px;height:42px;display:flex;align-items:center;padding:0 18px;background:#fff;color:#111;border:1px solid var(--slot-border);border-right:14px solid var(--accent,#cbd5e1);box-shadow:0 8px 20px rgba(0,0,0,.1);border-radius:14px}.slot.top{top:8px}.slot.bottom{top:54px}.slot.clickable{cursor:pointer;transition:transform .14s,box-shadow .14s}.slot.clickable:hover:not(.empty){transform:translateY(-1px);box-shadow:0 12px 24px rgba(0,0,0,.13)}.slot.selected{outline:3px solid rgba(15,23,42,.14);outline-offset:2px}.slot.empty{color:rgba(100,116,139,.78);border-style:dashed;border-right-style:solid}.slot .name{font-weight:900;font-size:clamp(16px,2vw,26px);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-transform:uppercase}.connector{z-index:0;position:absolute;right:20px;width:66px;border-right:4px solid var(--line);border-top:4px solid var(--line);border-bottom:4px solid var(--line);border-top-right-radius:14px;border-bottom-right-radius:14px}.connector.short{height:44px;top:30px}.connector.medium{height:74px;top:14px}.connector.tall{height:128px;top:-8px}.connector.midline{z-index:0;position:absolute;right:-58px;top:50px;width:58px;border-top:4px solid var(--line)}.winner-column .match{left:32px}.semis-column .match{left:24px}.final-column .match{left:16px}.grand-column .match{left:12px}.label-badge{z-index:3;position:absolute;left:-18px;top:37px;min-width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;background:#000;color:#fff;font-size:14px;font-weight:800;box-shadow:0 6px 14px rgba(0,0,0,.2)}.panel-shell{position:absolute;inset:24px;display:grid;grid-template-columns:520px minmax(0,1fr);gap:20px}.panel,.preview{padding:14px;min-width:0;min-height:0}.panel{overflow-y:auto}.team-card{background:rgba(255,255,255,.88);border:1px solid rgba(15,23,42,.08);border-radius:18px;padding:12px;display:grid;grid-template-columns:72px 1fr;gap:12px;align-items:center;margin-bottom:10px}.color-stack{display:flex;flex-direction:column;align-items:center;gap:8px}.color-preview{width:42px;height:42px;border-radius:12px;border:1px solid rgba(15,23,42,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}.color-hex{width:64px;font-size:11px;font-weight:800;text-align:center;color:var(--muted);text-transform:uppercase}.team-fields{display:grid;grid-template-columns:1fr 124px;gap:8px 10px;align-items:end}.team-fields label{grid-column:1/-1;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.team-school-select,.team-name-input,.team-hex-input,.team-color-input{width:100%;border:1px solid rgba(15,23,42,.12);border-radius:12px;outline:none;transition:border-color .26s,box-shadow .26s;font:inherit}.team-school-select,.team-name-input,.team-hex-input{height:42px;padding:0 12px;background:#fff;font-size:16px;font-weight:700;color:var(--text)}.team-school-select{grid-column:1/-1;font-size:15px;cursor:pointer}.color-controls{grid-column:2;display:grid;grid-template-columns:42px 72px;gap:8px;align-items:center;justify-content:end}.team-color-input{width:42px;height:42px;padding:3px;background:#fff;cursor:pointer}.team-school-select:focus,.team-name-input:focus,.team-hex-input:focus,.team-color-input:focus{border-color:rgba(15,23,42,.28);box-shadow:0 0 0 4px rgba(15,23,42,.08)}.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px}.action{height:42px;border-radius:12px;border:1px solid rgba(15,23,42,.12);background:#fff;font-size:14px;font-weight:800;color:var(--text);cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.08)}.preview iframe{width:100%;height:100%;border:0;border-radius:18px;background:var(--bg)}
</style>
</head>
<body>
<div class="scene"><div class="card" id="card">
<section class="face front">
<button class="flip-corner" id="flipToEdit" aria-label="Flip to edit mode"></button>
<div class="bracket-wrap"><div class="bracket-grid" id="bracketGrid"></div></div>
</section>
<section class="face back">
<button class="flip-corner" id="flipToView" aria-label="Flip to bracket view"></button>
<div class="panel-shell">
<div class="panel">
<div><h1>Bracket Setup</h1><p>Enter the 8 team names and choose primary and secondary colors for each team. When you pick a school, its saved brand pair is applied automatically.</p></div>
<div id="teamList"></div>
<div class="toolbar"><button class="action" id="resetBracketBtn">Reset Bracket</button><button class="action" id="undoBtn">Undo</button><button class="action" id="clearAllBtn">Clear All</button></div>
</div>
<div class="preview"><iframe id="previewFrame" title="Bracket preview"></iframe></div>
</div>
</section>
</div></div>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],KEY='double-elim-bracket-state-v2';
const SCHOOLS=[['Custom','','','',''],['Boise State','Blue','#0033A0','Orange','#D64309'],['Syracuse','Orange','#F76900','Navy','#000E54'],['Michigan State','Spartan Green','#18453B','White','#FFFFFF'],['Ohio State','Scarlet','#BB0000','Gray','#666666'],['Kansas','KU Blue','#0051BA','Crimson','#E8000D'],['Nebraska','Husker Red','#E41C38','Cream','#F2F0E6'],['Baylor','Baylor Green','#003015','Gold','#FFB81C'],['Minnesota','Maroon','#7A0019','Gold','#FFCC33'],['Utah','Crimson','#CC0000','Black','#000000']].map(([name,primaryColorName,primaryHex,secondaryColorName,secondaryHex])=>({name,primaryColorName,primaryHex,secondaryColorName,secondaryHex}));
const SEEDS=['t1','t2','t3','t4','t5','t6','t7','t8'];
const MATCHES=[
{id:'A',row:2,col:1,top:0,bottom:1,label:'A',w:'',y:0,con:'medium'},{id:'B',row:2,col:1,top:2,bottom:3,label:'B',y:126,con:'medium'},{id:'C',row:2,col:1,top:4,bottom:5,label:'C',y:252,con:'medium'},{id:'D',row:2,col:1,top:6,bottom:7,label:'D',y:378,con:'medium'},
{id:'E',row:2,col:2,top:['winner','A'],bottom:['winner','B'],label:'E',y:63,w:'wide',con:'tall'},{id:'F',row:2,col:2,top:['winner','C'],bottom:['winner','D'],label:'F',y:315,w:'wide',con:'tall'},
{id:'G',row:2,col:3,top:['winner','E'],bottom:['winner','F'],label:'G',y:189,w:'wide',con:'medium'},{id:'H',row:2,col:4,top:['winner','G'],bottom:['winner','O'],label:'H',y:189,w:'narrow'},
{id:'J',row:4,col:1,top:['loser','C'],bottom:['loser','D'],label:'J',y:0,con:'short'},{id:'K',row:4,col:1,top:['loser','A'],bottom:['loser','B'],label:'K',y:108,con:'short'},
{id:'L',row:4,col:2,top:['winner','J'],bottom:['loser','E'],label:'L',y:8,w:'wide',con:'short'},{id:'M',row:4,col:2,top:['winner','K'],bottom:['loser','F'],label:'M',y:116,w:'wide',con:'short'},
{id:'N',row:4,col:3,top:['winner','L'],bottom:['winner','M'],label:'N',y:62,w:'wide',con:'short'},{id:'O',row:4,col:4,top:['winner','N'],bottom:['loser','G'],label:'O',y:62,w:'narrow'}
];
const TITLES=[['Winners Round 1',1,1,''],['Winners Semi Final',2,1,''],['Winners Final',3,1,''],['Grand Final',4,1,''],['Losers Round 1',1,3,'title small'],['Losers Quarter Final',2,3,'title small'],['Losers Semi Final',3,3,'title small'],['Losers Final',4,3,'title small']];
const order=['A','B','C','D','E','F','J','K','L','M','G','N','O','H'];
const refs=Object.fromEntries(MATCHES.map(m=>[m.id,{top:m.top,bottom:m.bottom}]));
const BRACKET_SEED_ORDER=[0,7,3,4,1,6,2,5];
const emptyTeam=(id,name)=>({id,name,primaryColor:'#FFFFFF',secondaryColor:'#111111'});
const defaultState=()=>({teams:SEEDS.map((id,i)=>emptyTeam(id,`Seed ${i+1}`)),winners:{},history:[]});
let state=load();
function hex(v,d='#94A3B8'){return/^#[0-9A-Fa-f]{6}$/.test(v||'')?v.toUpperCase():d}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function clone(v){return JSON.parse(JSON.stringify(v))}
function load(){try{const p=JSON.parse(localStorage.getItem(KEY)||'null');if(!p)return defaultState();const d=defaultState();return{teams:(p.teams||d.teams).slice(0,8).map((t,i)=>({id:t.id||d.teams[i].id,name:t.name||d.teams[i].name,primaryColor:hex(t.primaryColor||t.color||d.teams[i].primaryColor,'#FFFFFF'),secondaryColor:hex(t.secondaryColor||d.teams[i].secondaryColor,'#111111')})),winners:p.winners||{},history:Array.isArray(p.history)?p.history:[]}}catch{return defaultState()}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function push(){state.history.push({teams:clone(state.teams),winners:clone(state.winners)});if(state.history.length>100)state.history.shift()}
function resolveBracket(){const done={},matches={};const seed=i=>state.teams[BRACKET_SEED_ORDER[i]]||null;const from=r=>Array.isArray(r)?((done[r[1]]&&done[r[1]][r[0]])||null):seed(r);for(const id of order){const top=from(refs[id].top),bottom=from(refs[id].bottom),selected=state.winners[id]||null,winner=top&&selected===top.id?top:bottom&&selected===bottom.id?bottom:null,loser=winner&&top&&bottom?(winner.id===top.id?bottom:top):null;matches[id]={top,bottom,selectedId:selected};done[id]={winner,loser}}return{matches,done}}
function normalize(){let changed=1;while(changed){changed=0;const {matches}=resolveBracket();for(const k of Object.keys(state.winners)){const m=matches[k],ok=[m?.top?.id,m?.bottom?.id].filter(Boolean);if(!ok.includes(state.winners[k])){delete state.winners[k];changed=1}}}}
function label(ref){
  if(!Array.isArray(ref)) return state.teams[ref]?.name || 'TBD';
  return `${ref[0][0].toUpperCase()+ref[0].slice(1)} ${ref[1]}`;
}
function slotHtml(id,side){return `<div class="slot ${side} clickable" data-match="${id}" data-side="${side}"></div>`}
function buildGrid(){const grid=$('#bracketGrid');grid.innerHTML=[...TITLES.map(([t,c,r,cls])=>`<div class="round-title ${cls}" style="grid-column:${c};grid-row:${r};">${t}</div>`),...['1-2-winner-column','2-2-semis-column','3-2-final-column','4-2-grand-column','1-4-winner-column','2-4-semis-column','3-4-final-column','4-4-grand-column'].map(k=>{const [col,row,colClass]=k.split('-');const ms=MATCHES.filter(m=>m.col==col&&m.row==row).map(m=>`<div class="match ${m.w||''}" style="top:${m.y}px;"><div class="label-badge">${m.label}</div>${slotHtml(m.id,'top')}${slotHtml(m.id,'bottom')}${m.con?`<div class="connector ${m.con}"></div><div class="connector midline"></div>`:''}</div>`).join('');return `<div class="column ${colClass}" style="grid-column:${col};grid-row:${row};"><div class="stack">${ms}</div></div>`})].join('');$$('.slot[data-match]').forEach(el=>el.addEventListener('click',pickWinner))}
function paintSlot(el,team,fallback,selected){const name=team?.name||fallback||'TBD';el.innerHTML=`<div class="name">${esc(name)}</div>`;el.classList.toggle('empty',!team);el.classList.toggle('clickable',!!team);el.classList.toggle('selected',!!team&&selected===team.id);const fill=team?hex(team.primaryColor,'#FFFFFF'):'#FFFFFF';const txt=team?.name==='Ohio State'?'#FFFFFF':team?hex(team.secondaryColor,'#111111'):'#64748B';const acc=team?hex(team.secondaryColor,'#111111'):'#CBD5E1';el.style.background=fill;el.style.color=txt;el.style.setProperty('--accent',acc);el.style.opacity=team?'1':'.92'}
function renderBracket(){normalize();const {matches}=resolveBracket();$$('.slot[data-match]').forEach(el=>{const m=matches[el.dataset.match],side=el.dataset.side,team=m?.[side]||null;paintSlot(el,team,label(refs[el.dataset.match][side]),m?.selectedId)});updatePreview();save()}
function schoolFor(team){return SCHOOLS.find(s=>s.name!=='Custom'&&s.name===team.name&&hex(s.primaryHex)===hex(team.primaryColor)&&hex(s.secondaryHex)===hex(team.secondaryColor))?.name||'Custom'}
function teamCard(team,i){const p=hex(team.primaryColor,'#FFFFFF'),s=hex(team.secondaryColor,'#111111'),opts=SCHOOLS.map(o=>`<option value="${esc(o.name)}" ${schoolFor(team)===o.name?'selected':''}>${esc(o.name==='Custom'?'Custom':`${o.name} (${o.primaryColorName} / ${o.secondaryColorName})`)}</option>`).join('');return `<div class="team-card"><div class="color-stack"><div class="color-preview" style="background:${p}"></div><div class="color-hex">P ${p}</div><div class="color-preview" style="background:${s}"></div><div class="color-hex">S ${s}</div></div><div class="team-fields"><label>Seed ${i+1}</label><select class="team-school-select" data-type="school" data-index="${i}">${opts}</select><input class="team-name-input" data-type="name" data-index="${i}" maxlength="28" value="${esc(team.name)}"><div class="color-controls"><input class="team-color-input" type="color" data-type="primary-picker" data-index="${i}" value="${p}"><input class="team-hex-input" data-type="primary-color" data-index="${i}" maxlength="7" value="${p}"><input class="team-color-input" type="color" data-type="secondary-picker" data-index="${i}" value="${s}"><input class="team-hex-input" data-type="secondary-color" data-index="${i}" maxlength="7" value="${s}"></div></div></div>`}
function bindEditor(){const wrap=$('#teamList');wrap.innerHTML=state.teams.map(teamCard).join('');wrap.querySelectorAll('input,select').forEach(el=>{el.addEventListener('focus',()=>el.dataset.lastValue=el.value);el.addEventListener(el.dataset.type==='name'||el.dataset.type?.includes('color')?'input':'change',handleEditor);if(el.dataset.type!=='school'&&el.dataset.type!=='primary-picker'&&el.dataset.type!=='secondary-picker')el.addEventListener('change',handleEditor)})}
function syncCard(card,key,val){const idx=key==='primaryColor'?0:1;card.querySelectorAll('.color-preview')[idx].style.background=val;card.querySelectorAll('.color-hex')[idx].textContent=`${key==='primaryColor'?'P':'S'} ${val}`;const a=key==='primaryColor'?'primary':'secondary';card.querySelector(`[data-type="${a}-picker"]`).value=val;card.querySelector(`[data-type="${a}-color"]`).value=val}
function handleEditor(e){const el=e.currentTarget,i=+el.dataset.index,t=el.dataset.type,team=state.teams[i],prev=clone(team),card=el.closest('.team-card');if(t==='school'&&e.type==='change'){const s=SCHOOLS.find(x=>x.name===el.value);if(!s||s.name==='Custom'){bindEditor();renderBracket();return}push();team.name=s.name;team.primaryColor=hex(s.primaryHex,'#FFFFFF');team.secondaryColor=hex(s.secondaryHex,'#111111');bindEditor();renderBracket();return}if(t==='name'){if(e.type==='input'){team.name=el.value;renderBracket();return}if((el.dataset.lastValue??'')!==team.name){push();state.history[state.history.length-1].teams[i].name=el.dataset.lastValue??''}save();return}const map={ 'primary-color':'primaryColor','secondary-color':'secondaryColor','primary-picker':'primaryColor','secondary-picker':'secondaryColor' }[t];if(!map)return;let v=hex((el.value||'').trim().startsWith('#')?el.value.trim():`#${(el.value||'').trim()}`,map==='primaryColor'?'#FFFFFF':'#111111');if(t.endsWith('color')&&e.type==='input'){if(!/^#[0-9A-Fa-f]{0,6}$/.test((el.value||'').trim().startsWith('#')?el.value.trim():`#${(el.value||'').trim()}`))return;team[map]=(el.value||'').trim().toUpperCase().startsWith('#')?(el.value||'').trim().toUpperCase():`#${(el.value||'').trim().toUpperCase()}`;if(/^#[0-9A-F]{6}$/.test(team[map]))syncCard(card,map,team[map]);renderBracket();return}team[map]=v;syncCard(card,map,v);if((el.dataset.lastValue||'').toUpperCase()!==v){push();state.history[state.history.length-1].teams[i][map]=hex(el.dataset.lastValue,map==='primaryColor'?'#FFFFFF':'#111111')}save();renderBracket()}
function pickWinner(e){const el=e.currentTarget,{matches}=resolveBracket(),m=matches[el.dataset.match],team=m?.[el.dataset.side];if(!team)return;push();state.winners[el.dataset.match]=state.winners[el.dataset.match]===team.id?undefined:team.id;if(state.winners[el.dataset.match]===undefined)delete state.winners[el.dataset.match];renderBracket()}
function updatePreview(){const d=$('#previewFrame').contentDocument||$('#previewFrame').contentWindow.document;const front=document.querySelector('.front').innerHTML;const styles=document.querySelector('style').textContent;d.open();d.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${styles}</style></head><body><div class="scene"><div class="card"><section class="face front">${front}</section></div></div></body></html>`);d.close();const editBtn=d.getElementById('flipToEdit');if(editBtn)editBtn.remove()}
function undo(){const p=state.history.pop();if(!p)return;state.teams=p.teams;state.winners=p.winners;bindEditor();renderBracket()}
function reset(){push();state.winners={};renderBracket()}
function clearAll(){push();state=defaultState();bindEditor();renderBracket()}
$('#flipToEdit').onclick=()=>$('#card').classList.add('flipped');$('#flipToView').onclick=()=>$('#card').classList.remove('flipped');
// Press "F" to flip the card
window.addEventListener('keydown',(e)=>{
  if(e.key==='f' || e.key==='F'){
    const c=$('#card');
    c.classList.toggle('flipped');
  }
});
$('#undoBtn').onclick=undo;$('#resetBracketBtn').onclick=reset;$('#clearAllBtn').onclick=clearAll;
buildGrid();bindEditor();renderBracket();
</script>
</body>
</html>
