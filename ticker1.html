<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>Lower Third Countdown Ticker</title>
  <style>
    :root {
      --bg: rgba(5, 8, 22, 0.64);
      --bg-2: rgba(8, 14, 34, 0.86);
      --line: rgba(87, 231, 255, 0.4);
      --line-soft: rgba(255, 79, 216, 0.24);
      --text: #f7fbff;
      --muted: #9eb4d6;
      --cyan: #57e7ff;
      --pink: #ff4fd8;
      --blue: #6c8cff;
      --shadow: 0 0 14px rgba(87, 231, 255, 0.35), 0 0 34px rgba(255, 79, 216, 0.18);
      --glow: 0 0 10px rgba(87, 231, 255, 0.8), 0 0 20px rgba(87, 231, 255, 0.4), 0 0 30px rgba(255, 79, 216, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1920px;
      height: 70px;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    body {
      position: relative;
    }

    .ticker-shell {
      position: relative;
      width: 1920px;
      height: 70px;
      display: flex;
      align-items: center;
      padding: 6px 16px;
      background:
        linear-gradient(90deg, rgba(6, 10, 24, 0.92), rgba(10, 16, 38, 0.82) 18%, rgba(10, 16, 38, 0.82) 82%, rgba(6, 10, 24, 0.92)),
        linear-gradient(180deg, rgba(87, 231, 255, 0.04), rgba(255, 79, 216, 0.04));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), inset 0 -1px 0 rgba(255, 255, 255, 0.05), var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .ticker-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(87, 231, 255, 0.12) 14%, transparent 30%, transparent 70%, rgba(255, 79, 216, 0.1) 86%, transparent),
        repeating-linear-gradient(90deg, rgba(87, 231, 255, 0.08) 0 1px, transparent 1px 120px);
      opacity: 0.5;
      pointer-events: none;
      z-index: -1;
    }

    .ticker-shell::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(87, 231, 255, 0.08), transparent 24%, transparent 76%, rgba(255, 79, 216, 0.08));
      pointer-events: none;
      z-index: -1;
    }

    .edge-fade {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 120px;
      z-index: 2;
      pointer-events: none;
    }

    .edge-fade.left {
      left: 0;
      background: linear-gradient(90deg, rgba(6, 10, 24, 1), rgba(6, 10, 24, 0));
    }

    .edge-fade.right {
      right: 0;
      background: linear-gradient(270deg, rgba(6, 10, 24, 1), rgba(6, 10, 24, 0));
    }

    .track-window {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .track {
      display: inline-flex;
      align-items: center;
      gap: 22px;
      white-space: nowrap;
      will-change: transform;
      animation: ticker-scroll 90s linear infinite;
      padding-left: 100%;
    }

    .event {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(11, 18, 42, 0.76), rgba(13, 22, 52, 0.58));
      border: 1px solid rgba(87, 231, 255, 0.22);
      box-shadow: inset 0 0 18px rgba(87, 231, 255, 0.06), 0 0 18px rgba(87, 231, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .event.pec {
      background: #05368A;
    }

    .event.mw {
      background: #101029;
    }

    .event.hs {
      background: #101029;
      animation: flash-red 1s infinite;
    }

    @keyframes flash-red {
      0% { background: #101029; }
      50% { background: #ff0000; }
      100% { background: #101029; }
    }

    .event::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(87, 231, 255, 0.08), transparent 45%, rgba(255, 79, 216, 0.08));
      pointer-events: none;
    }

    .event-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: var(--glow);
      padding-right: 4px;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(180deg, transparent, rgba(87, 231, 255, 0.85), transparent);
      box-shadow: 0 0 12px rgba(87, 231, 255, 0.5);
      flex: 0 0 auto;
    }

    .countdown {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      font-variant-numeric: tabular-nums;
    }

    .chunk {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }

    .value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      color: #ffffff;
      text-shadow: var(--glow);
      transition: color 250ms ease;
    }

    .value.flash-update {
      color: #d64309;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      box-shadow: 0 0 10px rgba(87, 231, 255, 0.8), 0 0 18px rgba(255, 79, 216, 0.4);
      flex: 0 0 auto;
    }

    .empty {
      display: none;
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-shadow: var(--glow);
    }

    .empty.show {
      display: block;
    }

    @keyframes ticker-scroll {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }
  </style>
</head>
<body>
  <main class="ticker-shell">
    <div class="edge-fade left"></div>
    <div class="edge-fade right"></div>
    <section class="track-window">
      <div id="tickerTrack" class="track"></div>
    </section>
    <section id="emptyState" class="empty">All countdowns have ended</section>
  </main>

  <script>
    const events = [
      {
        name: "PEC Championships",
        target: "2026-04-10T09:00:00-06:00"
      },
      {
        name: "MW Championships",
        target: "2026-04-11T18:00:00-06:00"
      },
      {
        name: "High School State",
        target: "2026-05-14T10:00:00-06:00"
      }
    ];

    const stats = [
      {
        name: "Social Views (since 9/1/25)",
        value: 4402827,
        step: 1,
        interval: 5080
      },
      {
        name: "Followers",
        value: 28267,
        step: 5,
        interval: 3600000
      }
    ];

    const track = document.getElementById("tickerTrack");
    const emptyState = document.getElementById("emptyState");

    let cards = [];
    let statCards = [];

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatNumber(num) {
      return num.toLocaleString();
    }

    function createEventElement(event) {
      const article = document.createElement("article");

      let extraClass = "";
      if (event.name === "PEC Championships") extraClass = " pec";
      if (event.name === "MW Championships") extraClass = " mw";
      if (event.name === "High School State") extraClass = " hs";

      article.className = "event" + extraClass;

      article.innerHTML = `
        <span class="event-name">${event.name}</span>
        <span class="divider"></span>
        <div class="countdown">
          <span class="chunk"><span class="value" data-part="days">00</span><span class="label">D</span></span>
          <span class="chunk"><span class="value" data-part="hours">00</span><span class="label">H</span></span>
          <span class="chunk"><span class="value" data-part="minutes">00</span><span class="label">M</span></span>
        </div>
      `;

      return {
        ...event,
        targetMs: new Date(event.target).getTime(),
        element: article,
        daysEl: article.querySelector('[data-part="days"]'),
        hoursEl: article.querySelector('[data-part="hours"]'),
        minutesEl: article.querySelector('[data-part="minutes"]'),
        active: true
      };
    }

    function createStatElement(stat) {
      const article = document.createElement("article");
      article.className = "event";

      article.innerHTML = `
        <span class="event-name">${stat.name}</span>
        <span class="divider"></span>
        <div class="countdown">
          <span class="chunk"><span class="value" data-stat="${stat.name}">${formatNumber(stat.value)}</span></span>
        </div>
      `;

      const valueEl = article.querySelector(`[data-stat="${stat.name}"]`);

      function flashStatValues() {
        valueEl.classList.add("flash-update");

        const rendered = track.querySelectorAll(`[data-stat="${stat.name}"]`);
        rendered.forEach(el => {
          el.classList.add("flash-update");
        });

        setTimeout(() => {
          valueEl.classList.remove("flash-update");
          const renderedAfter = track.querySelectorAll(`[data-stat="${stat.name}"]`);
          renderedAfter.forEach(el => {
            el.classList.remove("flash-update");
          });
        }, 250);
      }

      setInterval(() => {
        stat.value += stat.step;
        valueEl.textContent = formatNumber(stat.value);

        const rendered = track.querySelectorAll(`[data-stat="${stat.name}"]`);
        rendered.forEach(el => {
          el.textContent = formatNumber(stat.value);
        });

        flashStatValues();
      }, stat.interval);

      return {
        element: article
      };
    }

    function rebuildTrack() {
      track.innerHTML = "";

      const activeCards = cards.filter(card => card.active);

      const sequence = [
        ...activeCards,
        ...statCards,
        ...activeCards,
        ...statCards
      ];

      if (sequence.length === 0) {
        emptyState.classList.add("show");
        track.style.display = "none";
        return;
      }

      emptyState.classList.remove("show");
      track.style.display = "inline-flex";

      sequence.forEach((card, index) => {
        if (index > 0) {
          const dot = document.createElement("span");
          dot.className = "dot";
          track.appendChild(dot);
        }

        track.appendChild(card.element.cloneNode(true));
      });
    }

    cards = events.map(createEventElement);
    statCards = stats.map(createStatElement);

    function updateCountdowns() {
      const now = Date.now();
      let changed = false;

      for (const card of cards) {
        if (!card.active) continue;

        const diff = card.targetMs - now;

        if (diff <= 0) {
          card.active = false;
          changed = true;
          continue;
        }

        const totalMinutes = Math.floor(diff / 60000);
        const days = Math.floor(totalMinutes / 1440);
        const hours = Math.floor((totalMinutes % 1440) / 60);
        const minutes = totalMinutes % 60;

        card.daysEl.textContent = pad(days);
        card.hoursEl.textContent = pad(hours);
        card.minutesEl.textContent = pad(minutes);
      }

      if (changed || track.children.length === 0) {
        rebuildTrack();
      } else {
        const activeCards = cards.filter(card => card.active);
        const renderedEvents = track.querySelectorAll('.event');

        renderedEvents.forEach((eventEl, index) => {
          const source = activeCards[index % activeCards.length];

          if (!source) return;

          const days = eventEl.querySelector('[data-part="days"]');
          if (!days) return;

          days.textContent = source.daysEl.textContent;
          eventEl.querySelector('[data-part="hours"]').textContent = source.hoursEl.textContent;
          eventEl.querySelector('[data-part="minutes"]').textContent = source.minutesEl.textContent;
        });
      }
    }

    rebuildTrack();
    updateCountdowns();

    setInterval(updateCountdowns, 1000);
  </script>
</body>
</html>
